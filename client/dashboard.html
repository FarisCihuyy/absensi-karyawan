      rel="stylesheet"

    <style>
      .animated {
        animation-duration: 0.3s;
        animation-fill-mode: both;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #007bff;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 15px;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: #666;
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #999;
      }

      .empty-state i {
        font-size: 64px;
        color: #ddd;
        margin-bottom: 20px;
        display: block;
      }

      .empty-state h5 {
        margin: 20px 0 10px;
        color: #333;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
      }

      .modal.show {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-content {
        background-color: #fefefe;
        padding: 0;
        border-radius: 6px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        animation: slideDown 0.3s;
      }

      @keyframes slideDown {
        from {
          transform: translateY(-50px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .modal-header {
        padding: 20px;
        border-bottom: 1px solid #dee2e6;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .modal-header h5 {
        margin: 0;
        font-weight: 600;
      }

      .btn-close {
        background: none;
        border: none;
        font-size: 28px;
        cursor: pointer;
        color: #999;
      }

      .btn-close:hover {
        color: #333;
      }

      .modal-body {
        padding: 20px;
      }

      .modal-footer {
        padding: 15px 20px;
        border-top: 1px solid #dee2e6;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #333;
        font-weight: 500;
        font-size: 14px;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
        font-family: inherit;
      }

      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
      }

      .alert {
        padding: 12px 15px;
        margin-bottom: 15px;
        border-radius: 4px;
        display: none;
      }

      .alert.show {
        display: block;
      }

      .alert-success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .alert-error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
    </style>
  </head>

      <button

      <ul class="nav navbar-nav ml-auto">

              "

          <div class="dropdown-menu dropdown-menu-right">

        <span class="navbar-toggler-icon"></span>

    <div class="app-body">
      <div class="sidebar sidebar-pills bg-transparent">
        <nav class="sidebar-nav">
          <ul class="nav">
            <li class="nav-item">
              <a class="nav-link" href="/"
                ><i class="nav-icon la la-lg la-dashboard"></i> Dashboard</a

            </li>
          </ul>
        </nav>
      </div>

      <main class="main">
        <!-- Breadcrumb-->
        <ol class="breadcrumb">
          <li class="breadcrumb-item">Home</li>
          <li class="breadcrumb-item"><a href="#">Admin</a></li>
          <li class="breadcrumb-item active">Dashboard</li>
        </ol>
        <div class="container-fluid">
          <div class="animated fadeIn">
            <!-- Alert Messages -->
            <div class="row">
              <div class="col-md-12">
                <div class="alert alert-success" id="successAlert"></div>
                <div class="alert alert-error" id="errorAlert"></div>
              </div>
            </div>

            <!-- Filters Section -->
            <div class="row">
              <div class="col-md-12">
                <div class="card">
                  <div class="card-body">
                    <div class="row">
                      <div class="col-md-3">
                        <div class="form-group">
                          <label for="filterNama">Cari Nama</label>
                          <input
                            type="text"
                            id="filterNama"
                            class="form-control"
                            placeholder="Masukkan nama..."
                          />
                        </div>
                      </div>
                      <div class="col-md-3">
                        <div class="form-group">
                          <label for="filterGender">Jenis Kelamin</label>
                          <select id="filterGender" class="form-control">
                            <option value="">-- Semua --</option>
                            <option value="L">Laki-laki</option>
                            <option value="P">Perempuan</option>
                          </select>
                        </div>
                      </div>
                      <div class="col-md-6">
                        <label>&nbsp;</label>
                        <div class="form-group">
                          <button
                            class="btn btn-primary"
                            onclick="searchAbsences()"
                          >
                            <i class="fa fa-search"></i> Cari
                          </button>
                          <button
                            class="btn btn-secondary"
                            onclick="resetFilters()"
                          >
                            <i class="fa fa-refresh"></i> Reset

                          <button
                            class="btn btn-success float-right"
                            onclick="openAddModal()"

                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

            <!-- Data Table Section -->
            <div class="row">
              <div class="col-md-12">
                <div class="card">
                  <div class="card-header">
                    <strong>Data Absensi</strong>
                  </div>
                  <div class="card-body p-0">
                    <div id="tableContent">
                      <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading data...</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

    <!-- Modal Form -->
    <div class="modal" id="formModal" style="overflow-y: auto">
      <div class="modal-content">
        <div class="modal-header">
          <h5 id="modalTitle">Tambah Data Absensi</h5>
          <button class="btn-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
          <form id="absenceForm">
            <div class="form-group">
              <label for="formNama">Nama *</label>
              <input type="text" id="formNama" required />
            </div>
            <div class="form-group">
              <label for="formAlamat">Alamat *</label>
              <input type="text" id="formAlamat" required />
            </div>
            <div class="form-group">
              <label for="formGender">Jenis Kelamin *</label>
              <select id="formGender" required>
                <option value="">-- Pilih --</option>
                <option value="L">Laki-laki</option>
                <option value="P">Perempuan</option>
              </select>
            </div>
            <div class="form-group">
              <label for="formTanggal">Tanggal Absen *</label>
              <input type="date" id="formTanggal" required />
            </div>
            <div class="form-group">
              <label for="formJamMasuk">Jam Masuk (HH:mm) *</label>
              <input type="time" id="formJamMasuk" required />
            </div>
            <div class="form-group">
              <label for="formJamKeluar">Jam Keluar (HH:mm) *</label>
              <input type="time" id="formJamKeluar" required />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">
            Batal
          </button>
          <button type="submit" class="btn btn-primary" onclick="saveAbsence()">
            Simpan
          </button>
        </div>
      </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pace/1.0.2/pace.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/perfect-scrollbar/1.5.0/perfect-scrollbar.min.js"></script>
    <script src="https://unpkg.com/@coreui/coreui@2.1.16/dist/js/coreui.min.js"></script>
    <script src="https://unpkg.com/pnotify@4.0.0/dist/iife/PNotify.js"></script>
    <script src="https://unpkg.com/pnotify@4.0.0/dist/iife/PNotifyButtons.js"></script>
    <script src="https://unpkg.com/pnotify@4.0.0/dist/iife/PNotifyConfirm.js"></script>
    <script src="https://unpkg.com/pnotify@4.0.0/dist/iife/PNotifyMobile.js"></script>
    <script src="https://unpkg.com/pnotify@4.0.0/dist/iife/PNotifyNonBlock.js"></script>
    <script>
      PNotify.defaults.styling = "bootstrap4";
    </script>
    <!-- Plugins and scripts required by this view-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.7.3/Chart.min.js"></script>
    <script src="https://unpkg.com/@coreui/coreui-plugin-chartjs-custom-tooltips@1.3.1/dist/js/custom-tooltips.min.js"></script>
    <script src="js/main.js"></script>

    <script src="js/api.js"></script>
    <script>
      let currentPage = 1;
      let currentLimit = 10;
      let editingId = null;
      let totalPages = 1;

      // Check authentication
      window.addEventListener("load", () => {
        if (!authService.isLoggedIn()) {
          window.location.href = "login.html";
          return;
        }

        // Set user info
        const user = authService.getUser();
        if (user) {
          document.getElementById("userInitial").textContent = user.username
            .charAt(0)
            .toUpperCase();
        }

        // Load absences
        loadAbsences();
      });

      async function loadAbsences() {
        try {
          const tableContent = document.getElementById("tableContent");
          tableContent.innerHTML =
            '<div class="loading"><div class="spinner"></div><p>Loading data...</p></div>';

          const params = {
            page: currentPage,
            limit: currentLimit,
            nama: document.getElementById("filterNama").value,
            jenis_kelamin: document.getElementById("filterGender").value,
          };

          const result = await absenceService.getAll(params);
          const absences = result.data;
          const pagination = result.pagination;

          totalPages = pagination.totalPages;

          if (absences.length === 0) {
            tableContent.innerHTML = `
            <div class="empty-state">
              <i class="fa fa-inbox"></i>
              <h5>No data found</h5>
              <p>Tidak ada data absensi yang sesuai dengan filter.</p>
            </div>
          `;
            return;
          }

          let tableHTML = `
          <table class="table table-responsive-sm table-striped mb-0">
            <thead class="thead-light">
              <tr>
                <th class="text-center">No</th>
                <th>Nama</th>
                <th>Alamat</th>
                <th class="text-center">Jenis Kelamin</th>
                <th>Tanggal</th>
                <th>Jam Masuk</th>
                <th>Jam Keluar</th>
                <th class="text-center">Aksi</th>
              </tr>
            </thead>
            <tbody>
        `;

          absences.forEach((absence, index) => {
            const no = (pagination.page - 1) * pagination.limit + index + 1;
            const gender =
              absence.jenis_kelamin === "L" ? "Laki-laki" : "Perempuan";
            const genderBadge =
              absence.jenis_kelamin === "L" ? "badge-male" : "badge-female";

            tableHTML += `
            <tr>
              <td class="text-center">${no}</td>
              <td>${absence.nama}</td>
              <td>${absence.alamat}</td>
              <td class="text-center"><span class="badge ${genderBadge}">${gender}</span></td>
              <td>${apiUtils.formatDate(absence.tanggal_absen)}</td>
              <td>${apiUtils.formatTime(absence.jam_masuk)}</td>
              <td>${apiUtils.formatTime(absence.jam_keluar)}</td>
              <td class="text-center">
                <button class="btn btn-sm btn-info" onclick="openEditModal(${absence.id})" title="Edit">
                  <i class="fa fa-pencil"></i>
                </button>
                <button class="btn btn-sm btn-danger" onclick="deleteAbsence(${absence.id})" title="Hapus">
                  <i class="fa fa-trash"></i>
                </button>
              </td>
            </tr>
          `;
          });

          tableHTML += "</tbody></table>";

          // Add pagination
          tableHTML += `
          <div style="padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #dee2e6; background-color: #f8f9fa;">
            <div style="font-size: 14px; color: #666;">
              Showing ${(pagination.page - 1) * pagination.limit + 1} to ${Math.min(pagination.page * pagination.limit, pagination.total)} of ${pagination.total} entries
            </div>
            <nav>
              <ul class="pagination" style="margin: 0;">
        `;

          if (pagination.page > 1) {
            tableHTML += `<li class="page-item"><a class="page-link" onclick="goToPage(1)" href="javascript:void(0)">First</a></li>`;
            tableHTML += `<li class="page-item"><a class="page-link" onclick="goToPage(${pagination.page - 1})" href="javascript:void(0)">Previous</a></li>`;
          } else {
            tableHTML += `<li class="page-item disabled"><span class="page-link">First</span></li>`;
            tableHTML += `<li class="page-item disabled"><span class="page-link">Previous</span></li>`;
          }

          for (let i = 1; i <= totalPages; i++) {
            if (i === pagination.page) {
              tableHTML += `<li class="page-item active"><span class="page-link">${i}</span></li>`;
            } else if (i <= pagination.page + 2 && i >= pagination.page - 2) {
              tableHTML += `<li class="page-item"><a class="page-link" onclick="goToPage(${i})" href="javascript:void(0)">${i}</a></li>`;
            }
          }

          if (pagination.page < totalPages) {
            tableHTML += `<li class="page-item"><a class="page-link" onclick="goToPage(${pagination.page + 1})" href="javascript:void(0)">Next</a></li>`;
            tableHTML += `<li class="page-item"><a class="page-link" onclick="goToPage(${totalPages})" href="javascript:void(0)">Last</a></li>`;
          } else {
            tableHTML += `<li class="page-item disabled"><span class="page-link">Next</span></li>`;
            tableHTML += `<li class="page-item disabled"><span class="page-link">Last</span></li>`;
          }

          tableHTML += `</ul></nav></div>`;

          tableContent.innerHTML = tableHTML;
        } catch (error) {
          showError(error.message);
          document.getElementById("tableContent").innerHTML = `
          <div class="empty-state">
            <i class="fa fa-exclamation-triangle"></i>
            <h5>Error</h5>
            <p>${error.message}</p>
          </div>
        `;
        }
      }

      function goToPage(page) {
        currentPage = page;
        loadAbsences();
      }

      function searchAbsences() {
        currentPage = 1;
        loadAbsences();
      }

      function resetFilters() {
        document.getElementById("filterNama").value = "";
        document.getElementById("filterGender").value = "";
        currentPage = 1;
        loadAbsences();
      }

      function openAddModal() {
        editingId = null;
        document.getElementById("modalTitle").textContent =
          "Tambah Data Absensi";
        document.getElementById("absenceForm").reset();
        document.getElementById("formModal").classList.add("show");
      }

      async function openEditModal(id) {
        try {
          editingId = id;
          const absence = await absenceService.getById(id);

          document.getElementById("modalTitle").textContent =
            "Edit Data Absensi";
          document.getElementById("formNama").value = absence.nama;
          document.getElementById("formAlamat").value = absence.alamat;
          document.getElementById("formGender").value = absence.jenis_kelamin;
          document.getElementById("formTanggal").value = absence.tanggal_absen;
          document.getElementById("formJamMasuk").value = apiUtils.formatTime(
            absence.jam_masuk,
          );
          document.getElementById("formJamKeluar").value = apiUtils.formatTime(
            absence.jam_keluar,
          );

          document.getElementById("formModal").classList.add("show");
        } catch (error) {
          showError(error.message);
        }
      }

      function closeModal() {
        document.getElementById("formModal").classList.remove("show");
        editingId = null;
      }

      async function saveAbsence() {
        try {
          const data = {
            nama: document.getElementById("formNama").value,
            alamat: document.getElementById("formAlamat").value,
            jenis_kelamin: document.getElementById("formGender").value,
            tanggal_absen: document.getElementById("formTanggal").value,
            jam_masuk: document.getElementById("formJamMasuk").value,
            jam_keluar: document.getElementById("formJamKeluar").value,
          };

          const filteredData = Object.fromEntries(
            Object.entries(data).filter(([_, value]) => value.trim() !== ""),
          );

          if (editingId) {
            await absenceService.update(editingId, filteredData);
            showSuccess("Data berhasil diupdate!");
          } else {
            await absenceService.create(filteredData);
            showSuccess("Data berhasil ditambahkan!");
          }

          closeModal();
          currentPage = 1;
          loadAbsences();
        } catch (error) {
          showError(error.message);
        }
      }

      async function deleteAbsence(id) {
        if (!confirm("Apakah Anda yakin ingin menghapus data ini?")) {
          return;
        }

        try {
          await absenceService.delete(id);
          showSuccess("Data berhasil dihapus!");
          loadAbsences();
        } catch (error) {
          showError(error.message);
        }
      }

      function showSuccess(message) {
        const alert = document.getElementById("successAlert");
        alert.textContent = message;
        alert.classList.add("show");

        setTimeout(() => {
          alert.classList.remove("show");
        }, 3000);
      }

      function showError(message) {
        const alert = document.getElementById("errorAlert");
        alert.textContent = message;
        alert.classList.add("show");

        setTimeout(() => {
          alert.classList.remove("show");
        }, 3000);
      }

      function logout() {
        if (confirm("Apakah Anda yakin ingin logout?")) {
          authService.logout();
          window.location.href = "login.html";
        }
      }

      // Close modal when clicking outside
      document.getElementById("formModal").addEventListener("click", (e) => {
        if (e.target.id === "formModal") {
          closeModal();
        }
      });
    </script>
  </body>
</html>
