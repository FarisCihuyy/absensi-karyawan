  <body class="app flex-row align-items-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card-group">
            <div class="card p-4">
              <form id="loginForm" class="card-body" style="position: relative">
                <h1>Login</h1>
                <p style="position: absolute; top: 8px; right: 8px">
                  <span style="color: #eab166; font-size: 13px"
                    >user: admin <br />
                    pass: admin123</span
                  >
                </p>
                <p class="text-muted">Sign In to your account</p>
                <div class="input-group mb-3">
                  <div class="input-group-prepend">
                    <span class="input-group-text"
                      ><i class="icon-user"></i
                    ></span>
                  </div>
                  <input
                    id="username"
                    class="form-control"
                    type="text"
                    placeholder="Username"
                    value="admin"
                  />
                </div>
                <div class="input-group mb-4">
                  <div class="input-group-prepend">
                    <span class="input-group-text"
                      ><i class="icon-lock"></i
                    ></span>
                  </div>
                  <input
                    id="password"
                    class="form-control"
                    type="password"
                    placeholder="Password"
                    value="admin123"
                  />
                </div>
                <div class="row">
                  <div class="col-6">
                    <button
                      id="loginBtn"
                      class="btn btn-primary px-4"
                      type="submit"
                    >
                      Login
                    </button>
                  </div>
                  <div class="col-6 text-right">
                    <button class="btn btn-link px-0" type="button">
                      Forgot password?
                    </button>
                  </div>
                </div>
                <div
                  id="errorMessage"
                  style="
                    background-color: rgba(255, 0, 0, 0.3);
                    color: red;
                    font-size: 14px;
                    font-weight: 500;
                    padding: 10px;
                    border-radius: 5px;
                    margin-top: 10px;
                    display: none;
                  "
                ></div>
              </form>
            </div>
            <div
              class="card text-white bg-primary py-5 d-md-down-none"
              style="width: 44%"
            >
              <div class="card-body text-center">
                <div>
                  <h2>Sign up</h2>
                  <p>
                    Lorem ipsum dolor sit amet, consectetur adipisicing elit,
                    sed do eiusmod tempor incididunt ut labore et dolore magna
                    aliqua.
                  </p>
                  <button class="btn btn-primary active mt-3" type="button">
                    Register Now!
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pace/1.0.2/pace.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/perfect-scrollbar/1.5.0/perfect-scrollbar.min.js"></script>
    <script src="https://unpkg.com/@coreui/coreui@2.1.16/dist/js/coreui.min.js"></script>
    <script src="https://unpkg.com/pnotify@4.0.0/dist/iife/PNotify.js"></script>
    <script src="https://unpkg.com/pnotify@4.0.0/dist/iife/PNotifyButtons.js"></script>
    <script src="https://unpkg.com/pnotify@4.0.0/dist/iife/PNotifyConfirm.js"></script>
    <script src="https://unpkg.com/pnotify@4.0.0/dist/iife/PNotifyMobile.js"></script>
    <script src="https://unpkg.com/pnotify@4.0.0/dist/iife/PNotifyNonBlock.js"></script>
    <script>
      PNotify.defaults.styling = "bootstrap4";
    </script>
    <!-- Plugins and scripts required by this view-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.7.3/Chart.min.js"></script>
    <script src="https://unpkg.com/@coreui/coreui-plugin-chartjs-custom-tooltips@1.3.1/dist/js/custom-tooltips.min.js"></script>
    <script src="js/api.js"></script>
    <script>
      // Handle login form submission
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value;
          const errorDiv = document.getElementById("errorMessage");
          const loginBtn = document.getElementById("loginBtn");

          // Reset error message
          errorDiv.style.display = "none";
          errorDiv.textContent = "";

          // Disable button
          loginBtn.disabled = true;

          try {
            await authService.login(username, password);

            // Redirect ke dashboard
            window.location.href = "dashboard.html";
          } catch (error) {
            // Show error message
            errorDiv.textContent = error.message;
            errorDiv.style.display = "block";

            // Re-enable button
            loginBtn.disabled = false;

            // Clear password field
            document.getElementById("password").value = "";
          }
        });

      // Check if already logged in
      if (authService.isLoggedIn()) {
        window.location.href = "dashboard.html";
      }
    </script>
  </body>
</html>
